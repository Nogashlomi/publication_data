        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.85);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --book-color: #fbbf24;
            --univ-color: #818cf8;
            --border-radius: 12px;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Panels */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            z-index: 1000;
            position: absolute;
        }

        #header-panel {
            top: 20px;
            left: 20px;
            width: 320px;
        }

        #header-panel h1 {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        #header-panel p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        #controls-panel {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 900px;
        }

        #filter-panel {
            top: 20px;
            right: 20px;
            width: 280px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Slider Styles */
        #slider-container {
            margin: 40px 20px 20px 20px;
        }

        .noUi-connect { background: var(--accent-color); }
        .noUi-target { border: none; background: #334155; height: 8px; }
        .noUi-handle { border-radius: 50%; background: var(--accent-color); border: 2px solid #fff; width: 18px; height: 18px; top: -6px; }
        .noUi-handle:before, .noUi-handle:after { display: none; }
        .noUi-tooltip { background: var(--accent-color); color: white; border-radius: 4px; border: none; font-size: 0.75rem; padding: 2px 6px; }

        /* Filter List */
        .filter-group { margin-bottom: 20px; }
        .filter-group h3 { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; opacity: 0.9; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        
        .uck-list { max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .uck-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 0.8rem; cursor: pointer; transition: color 0.2s; }
        .uck-item:hover { color: var(--accent-color); }
        .uck-item input { margin-right: 10px; }

        .layer-toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot-book { background-color: var(--book-color); }
        .dot-univ { background-color: var(--univ-color); }

        /* Popups */
        .leaflet-popup-content-wrapper { background: var(--panel-bg); color: #fff; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; }
        .leaflet-popup-tip { background: var(--panel-bg); }
        .popup-title { font-weight: 700; color: var(--accent-color); margin-bottom: 4px; }
        .popup-meta { font-size: 0.8rem; opacity: 0.8; margin-bottom: 8px; }
        .popup-ucks { font-size: 0.75rem; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; color: var(--book-color); }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        @media (max-width: 768px) {
            #header-panel, #filter-panel { width: calc(100% - 40px); position: relative; margin: 10px 20px; top: auto; right: auto; left: auto; }
            #controls-panel { width: calc(100% - 40px); bottom: 10px; }
            body { overflow-y: auto; }
            #map { height: 400px; }
        }
    </style>
</head>

        "city": "Vienna, Austria",
        "lat": 48.21,
        "lon": 16.36,
        "foundation": 1365,
        "closing": 9999,
        "type_name": "Founded by Rudolf IV"
    }
];

                populateUckFilter();
                setupSlider();
                
                // Add event listeners for toggles
                document.getElementById('toggle-books').addEventListener('change', updateMap);
                document.getElementById('toggle-univ').addEventListener('change', updateMap);
                
                updateMap();

            } catch (err) {
                console.error("Error loading data:", err);
                alert("Failed to load data. Please ensure books_data.json and universities_data.json are in the same folder and you are viewing via a local server.");
            }
        }

        function populateUckFilter() {
            const uckSet = new Set();
            books.forEach(b => b.ucks.forEach(u => uckSet.add(u)));
            const sortedUcks = Array.from(uckSet).sort();
            
            const list = document.getElementById('uck-filter-list');
            sortedUcks.forEach(uck => {
                selectedUcks.add(uck);
                const div = document.createElement('div');
                div.className = 'uck-item';
                div.innerHTML = `<label><input type="checkbox" value="${uck}" checked onchange="toggleUck('${uck}')"> ${uck}</label>`;
                list.appendChild(div);
            });
        }

        function toggleUck(uck) {
            if (selectedUcks.has(uck)) selectedUcks.delete(uck);
            else selectedUcks.add(uck);
            updateMap();
        }

        function selectAllBucks(val) {
            const checks = document.querySelectorAll('#uck-filter-list input');
            checks.forEach(c => {
                c.checked = val;
                if (val) selectedUcks.add(c.value);
                else selectedUcks.delete(c.value);
            });
            updateMap();
        }

        function setupSlider() {
            const years = books.map(b => b.year).concat(universities.map(u => u.foundation)).filter(y => y > 0);
            const min = Math.min(...years) || 1400;
            const max = Math.max(...years) || 1650;
            currentYearRange = [min, max];

            const slider = document.getElementById('year-slider');
            noUiSlider.create(slider, {
                start: [min, max],
                connect: true,
                range: { min: min, max: max },
                step: 1,
                tooltips: true,
                format: {
                    to: v => Math.round(v),
                    from: v => Number(v)
                }
            });

            slider.noUiSlider.on('update', (values) => {
                currentYearRange = values.map(v => parseInt(v));
                updateMap();
            });
        }

        function updateMap() {
            bookLayer.clearLayers();
            univLayer.clearLayers();

            const showBooks = document.getElementById('toggle-books').checked;
            const showUniv = document.getElementById('toggle-univ').checked;

            let visibleBooks = 0;
            let visibleUniv = 0;

            if (showBooks) {
                books.forEach(b => {
                    const inYear = b.year >= currentYearRange[0] && b.year <= currentYearRange[1];
                    const hasUck = b.ucks.length === 0 || b.ucks.some(u => selectedUcks.has(u));
                    
                    if (inYear && hasUck) {
                        visibleBooks++;
                        const marker = L.circleMarker([b.lat, b.lon], {
                            radius: 5,
                            fillColor: '#fbbf24',
                            color: '#fff',
                            weight: 1,
                            fillOpacity: 0.8
                        });
                        
                        marker.bindPopup(`
                            <div class="popup-title">${b.title}</div>
                            <div class="popup-meta">
                                <strong>Place:</strong> ${b.place}<br>
                                <strong>Year:</strong> ${b.year}<br>
                                <strong>Author:</strong> ${b.authors}
                            </div>
                            <div class="popup-ucks">
                                ${b.ucks.join(', ')}
                            </div>
                        `);
                        marker.addTo(bookLayer);
                    }
                });
            }

            if (showUniv) {
                universities.forEach(u => {
                    // Check if university existed in this range
                    // Either founded before max, and [never closed or closed after min]
                    const exists = u.foundation <= currentYearRange[1] && u.closing >= currentYearRange[0];
                    
                    if (exists) {
                        visibleUniv++;
                        const marker = L.circleMarker([u.lat, u.lon], {
                            radius: 7,
                            fillColor: '#818cf8',
                            color: '#fff',
                            weight: 2,
                            fillOpacity: 0.6
                        });
                        
                        marker.bindPopup(`
                            <div class="popup-title">${u.label}</div>
                            <div class="popup-meta">
                                <strong>City:</strong> ${u.city}<br>
                                <strong>Founded:</strong> ${u.foundation}<br>
                                <strong>Status:</strong> ${u.closing > 2000 ? 'Still Continuous' : 'Closed c.' + u.closing}<br>
                                <strong>Type:</strong> ${u.type_name}
                            </div>
                        `);
                        marker.addTo(univLayer);
                    }
                });
            }

            document.getElementById('book-count').innerText = visibleBooks;
            document.getElementById('univ-count').innerText = visibleUniv;
        }

        init();
    </script>
</body>
</html>
